name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read

jobs:
  yamllint:
    name: YAML lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: pip install yamllint --quiet
      - run: yamllint -c .yamllint.yml .

  secrets:
    name: Secrets detection
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  kubeconform:
    name: Kubernetes manifest validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install kubeconform
        run: |
          curl -sL https://github.com/yannh/kubeconform/releases/latest/download/kubeconform-linux-amd64.tar.gz \
            | tar -xz -C /usr/local/bin kubeconform

      - name: Validate Kubernetes manifests
        run: |
          find bootstrap infrastructure clusters -name '*.yaml' -o -name '*.yml' 2>/dev/null \
            | xargs kubeconform \
                -strict \
                -ignore-missing-schemas \
                -summary

  helm-lint:
    name: Helm lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Helm
        uses: azure/setup-helm@v4
        with:
          version: "3.17.0"

      - name: Add chart repositories
        run: |
          helm repo add cilium https://helm.cilium.io
          helm repo add jetstack https://charts.jetstack.io
          helm repo add argo https://argoproj.github.io/argo-helm
          helm repo update

      - name: Lint Cilium chart
        run: |
          CHART_VERSION=$(grep 'targetRevision:' infrastructure/cilium/application.yaml | head -1 | awk '{print $2}' | tr -d '"')
          helm pull cilium/cilium --version "$CHART_VERSION" --untar --untardir /tmp/charts
          helm lint /tmp/charts/cilium --values infrastructure/cilium/values.yaml

      - name: Lint cert-manager chart
        run: |
          CHART_VERSION=$(grep 'targetRevision:' infrastructure/cert-manager/application.yaml | head -1 | awk '{print $2}' | tr -d '"')
          helm pull jetstack/cert-manager --version "$CHART_VERSION" --untar --untardir /tmp/charts
          helm lint /tmp/charts/cert-manager --values infrastructure/cert-manager/values.yaml

  pluto:
    name: API deprecation check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Read target Kubernetes version
        id: k8s
        run: |
          K8S_VERSION=$(grep '^kubernetes_version:' omni/talos-image.yaml | awk '{print $2}')
          echo "version=${K8S_VERSION}" >> "$GITHUB_OUTPUT"
          echo "Checking against Kubernetes ${K8S_VERSION}"

      - name: Install pluto
        run: |
          curl -sL https://github.com/FairwindsOps/pluto/releases/latest/download/pluto_linux_amd64.tar.gz \
            | tar -xz -C /usr/local/bin pluto

      - name: Check for deprecated APIs
        run: |
          pluto detect-files \
            --directory . \
            --target-versions "k8s=${{ steps.k8s.outputs.version }}" \
            --ignore-deprecations \
            --output wide

  markdownlint:
    name: Markdown lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm install -g markdownlint-cli2
      - run: markdownlint-cli2 "**/*.md" "#node_modules"

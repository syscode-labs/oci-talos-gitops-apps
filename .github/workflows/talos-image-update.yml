name: Update Talos image

on:
  repository_dispatch:
    types: [talos-image-update]

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v6

      - name: Update omni/talos-image.yaml
        env:
          TALOS_VERSION: ${{ github.event.client_payload.talos_version }}
        run: |
          sed -i "s|^talos_version:.*|talos_version: ${TALOS_VERSION}|" omni/talos-image.yaml
          sed -i "s|^updated_at:.*|updated_at: \"$(date -u +%Y-%m-%dT%H:%M:%SZ)\"|" omni/talos-image.yaml

      - name: Open pull request
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TALOS_VERSION: ${{ github.event.client_payload.talos_version }}
        run: |
          BRANCH="talos-image-update/${TALOS_VERSION}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "${BRANCH}"
          git add omni/talos-image.yaml
          git diff --cached --quiet && echo "No changes" && exit 0
          git commit -m "chore: update Talos installer image to ${TALOS_VERSION}"
          git push origin "${BRANCH}"
          gh pr create \
            --title "chore: update Talos installer image to ${TALOS_VERSION}" \
            --body "Auto-generated by talos-images build workflow." \
            --base main \
            --head "${BRANCH}"

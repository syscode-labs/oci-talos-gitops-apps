# Talos inline manifests applied during cluster bootstrap by the first control plane node.
# These run before any workload scheduler is up, so they must be self-contained YAML.
#
# REGENERATE after Cilium/Argo CD version bumps:
#   mise run oci:generate-manifests
#
# Cilium is configured for:
#   - kubeProxyReplacement=true (Talos, no kube-proxy)
#   - k8sServiceHost=localhost, k8sServicePort=7445 (KubePrism — node-local API proxy)
#   - ipam.mode=kubernetes
#
# Argo CD is the raw upstream install manifest + a root App-of-Apps pointing at the
# apps repo (syscode-labs/oci-talos-gitops-apps). Argo CD picks up all apps from there.

cluster:
  inlineManifests:
    - name: cilium
      contents: |
        # Generated by: mise run oci:generate-manifests
        # Source: helm template cilium cilium/cilium --version <CILIUM_VERSION> \
        #   --namespace kube-system \
        #   --set kubeProxyReplacement=true \
        #   --set k8sServiceHost=localhost \
        #   --set k8sServicePort=7445 \
        #   --set ipam.mode=kubernetes \
        #   --set hubble.relay.enabled=true \
        #   --set hubble.ui.enabled=true
        #
        # Run: mise run oci:generate-manifests  — output replaces this block
        #
        # !!! PLACEHOLDER — run mise run oci:generate-manifests to populate !!!

    - name: argocd
      contents: |
        # Generated by: mise run oci:generate-manifests
        # Source: curl -sL https://raw.githubusercontent.com/argoproj/argo-cd/<ARGOCD_VERSION>/manifests/install.yaml
        # Namespace: argocd
        #
        # Run: mise run oci:generate-manifests  — output replaces this block
        #
        # !!! PLACEHOLDER — run mise run oci:generate-manifests to populate !!!

    - name: argocd-app-of-apps
      contents: |
        # Root App-of-Apps — Argo CD manages itself and all cluster apps from here.
        # Update REPO_URL and TARGET_REVISION to match your apps repo.
        apiVersion: argoproj.io/v1alpha1
        kind: Application
        metadata:
          name: root
          namespace: argocd
        spec:
          project: default
          source:
            repoURL: https://github.com/syscode-labs/oci-talos-gitops-apps
            targetRevision: HEAD
            path: bootstrap
          destination:
            server: https://kubernetes.default.svc
            namespace: argocd
          syncPolicy:
            automated:
              prune: true
              selfHeal: true

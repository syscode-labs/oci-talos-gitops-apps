kind: Cluster
name: oci-talos
labels:
  environment: oci
kubernetes:
  # Not touched by the talos-images upgrade workflow — bump deliberately, one
  # minor at a time. Talos 1.13.x supports k8s 1.31–1.36 (SupportedKubernetesVersions=6
  # counting back from its 1.36.2 default), so this is valid as-is.
  version: v1.32.3
talos:
  # Keep in step with installImage in omni/machine-classes/*.yaml.
  version: v1.13.5
patches:
  - file: ../patches/cni-none.yaml
  - file: ../patches/disable-kube-proxy.yaml
  - file: ../patches/allow-scheduling.yaml
  - file: ../patches/inline-manifests.yaml
controlPlane:
  # Single control-plane: OCI Always Free Ampere is capped at 2 OCPU / 12 GB
  # (2 instances), so the cluster can hold at most 2 nodes. One control-plane
  # (single-member etcd) plus one worker. The allow-scheduling patch lets the
  # control-plane run workloads too. Grow to 3 only if the tenancy gains quota.
  machineClass:
    name: oci-cp
    size: 1
workers:
  - machineClass:
      name: oci-worker
      size: 1
